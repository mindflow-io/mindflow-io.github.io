<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560"
     role="img" aria-label="Meetflow data-flow diagram: all audio processing stays on your Mac.">
  <defs>
    <linearGradient id="arch-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="arch-grad-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.08"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#22D3EE"/>
    </marker>
  </defs>

  <!-- Dark background matches the landing page so the SVG is legible both embedded and standalone. -->
  <rect width="1040" height="560" rx="20" fill="#0F0F17"/>

  <!-- Caption -->
  <text x="520" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#E2E8F0">
    Every arrow stays inside your Mac.
  </text>
  <text x="520" y="62" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#94A3B8">
    Audio captured, transcribed, and stored locally. MCP server runs on localhost.
  </text>

  <!-- "Your Mac" boundary -->
  <rect x="40" y="90" width="800" height="440" rx="24"
        fill="url(#arch-grad-soft)" stroke="url(#arch-grad)" stroke-width="2" stroke-dasharray="6 4"/>
  <g transform="translate(70, 120)">
    <circle cx="0" cy="0" r="5" fill="#22D3EE"/>
    <text x="14" y="5" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#22D3EE">
      Your Mac — everything happens here
    </text>
  </g>

  <!-- ============================================
       TOP ROW (left → right)
       ============================================ -->

  <!-- Node 1: System Audio -->
  <g transform="translate(70, 170)">
    <rect width="220" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="0.1em">SYSTEM AUDIO</text>
    <text x="110" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#E2E8F0">Zoom · Meet · Teams · Slack</text>
  </g>

  <!-- Arrow 1: System Audio → ScreenCaptureKit -->
  <line x1="290" y1="206" x2="332" y2="206" stroke="#22D3EE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 2: ScreenCaptureKit -->
  <g transform="translate(340, 170)">
    <rect width="220" height="72" rx="12" fill="rgba(6,182,212,0.08)" stroke="#06B6D4" stroke-opacity="0.4" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22D3EE" letter-spacing="0.1em">macOS</text>
    <text x="110" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#E2E8F0">ScreenCaptureKit</text>
  </g>

  <!-- Arrow 2: ScreenCaptureKit → whisper.cpp -->
  <line x1="560" y1="206" x2="602" y2="206" stroke="#22D3EE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 3: whisper.cpp -->
  <g transform="translate(610, 170)">
    <rect width="220" height="72" rx="12" fill="rgba(99,102,241,0.08)" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#818CF8" letter-spacing="0.1em">ON-DEVICE AI</text>
    <text x="110" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#E2E8F0">whisper.cpp · Metal</text>
  </g>

  <!-- Arrow 3: whisper.cpp → Markdown (vertical, down) -->
  <line x1="720" y1="242" x2="720" y2="402" stroke="#22D3EE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============================================
       BOTTOM ROW (right → left)
       ============================================ -->

  <!-- Node 4: Markdown + JSONL -->
  <g transform="translate(610, 410)">
    <rect width="220" height="72" rx="12" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#34D399" letter-spacing="0.1em">YOUR FILES</text>
    <text x="110" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#E2E8F0">Markdown + JSONL</text>
  </g>

  <!-- Arrow 4: Markdown → MCP server (horizontal, left) -->
  <line x1="608" y1="446" x2="566" y2="446" stroke="#22D3EE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 5: MCP server (localhost) -->
  <g transform="translate(340, 410)">
    <rect width="220" height="72" rx="12" fill="rgba(6,182,212,0.08)" stroke="#06B6D4" stroke-opacity="0.4" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22D3EE" letter-spacing="0.1em">LOCALHOST</text>
    <text x="110" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#E2E8F0">MCP server</text>
  </g>

  <!-- Arrow 5: MCP server → AI Assistant (horizontal, left) -->
  <line x1="338" y1="446" x2="296" y2="446" stroke="#22D3EE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 6: AI Assistant -->
  <g transform="translate(70, 410)">
    <rect width="220" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="0.1em">YOUR AI ASSISTANT</text>
    <text x="110" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#E2E8F0">Claude Code · Cursor</text>
  </g>

  <!-- ============================================
       OUTSIDE THE MAC: "No cloud" block
       ============================================ -->

  <!-- "No cloud" block (outside Mac boundary) -->
  <g transform="translate(870, 260)">
    <rect width="150" height="100" rx="14" fill="rgba(239,68,68,0.06)" stroke="#EF4444" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- Cloud with slash -->
    <g transform="translate(45, 22)" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 12 24 A 8 8 0 0 1 20 16 A 10 10 0 0 1 38 20 A 7 7 0 0 1 42 34 L 14 34 A 8 8 0 0 1 12 24 Z"/>
      <line x1="6" y1="8" x2="48" y2="42" stroke="#EF4444" stroke-width="2.5"/>
    </g>
    <text x="75" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F87171">No cloud</text>
    <text x="75" y="94" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#FCA5A5">No server · No account</text>
  </g>

  <!-- Blocked "attempted" path from Mac to cloud — a dashed red segment with a prohibition sign -->
  <g>
    <!-- dashed line from the right edge of the Mac boundary toward the no-cloud block -->
    <line x1="842" y1="310" x2="870" y2="310" stroke="#EF4444" stroke-width="2" stroke-dasharray="3 3"/>
    <!-- Prohibition sign centered on that line -->
    <circle cx="856" cy="310" r="10" fill="#0F0F17" stroke="#EF4444" stroke-width="2"/>
    <line x1="850" y1="304" x2="862" y2="316" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
