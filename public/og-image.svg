<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#0F0F17"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="gradAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo mark (stylized waveform in rounded square) -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="url(#gradAccent)"/>
    <g transform="translate(18, 20)" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="0" y1="16" x2="0" y2="16"/>
      <line x1="6" y1="10" x2="6" y2="22"/>
      <line x1="12" y1="4" x2="12" y2="28"/>
      <line x1="18" y1="12" x2="18" y2="20"/>
      <line x1="24" y1="6" x2="24" y2="26"/>
      <line x1="30" y1="14" x2="30" y2="18"/>
      <line x1="36" y1="8" x2="36" y2="24"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="172" y="130" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="32" font-weight="700" fill="#E2E8F0" letter-spacing="-0.02em">
    Meetflow
  </text>

  <!-- Headline -->
  <text x="80" y="290" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="78" font-weight="800" fill="#E2E8F0" letter-spacing="-0.025em">
    Your meetings
  </text>
  <text x="80" y="372" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="78" font-weight="800" fill="url(#gradText)" letter-spacing="-0.025em">
    never leave your Mac.
  </text>

  <!-- Sub-headline -->
  <text x="80" y="445" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="400" fill="#94A3B8" letter-spacing="-0.01em">
    On-device transcription for macOS. No cloud, no bot, no account.
  </text>
  <text x="80" y="482" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="400" fill="#94A3B8" letter-spacing="-0.01em">
    Streams live to Claude Code and Cursor via MCP.
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 540)">
    <g>
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="22" cy="22" r="4" fill="#06B6D4"/>
      <text x="38" y="29" font-family="Inter, system-ui, -apple-system, sans-serif"
            font-size="16" font-weight="500" fill="#22D3EE">100% Local</text>
    </g>
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="22" cy="22" r="4" fill="#10B981"/>
      <text x="38" y="29" font-family="Inter, system-ui, -apple-system, sans-serif"
            font-size="16" font-weight="500" fill="#34D399">Real-time</text>
    </g>
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="200" height="44" rx="22" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="22" cy="22" r="4" fill="#6366F1"/>
      <text x="38" y="29" font-family="Inter, system-ui, -apple-system, sans-serif"
            font-size="16" font-weight="500" fill="#818CF8">MCP-native</text>
    </g>
  </g>

  <!-- Waveform decoration (right side) -->
  <g transform="translate(880, 240)" stroke="url(#gradAccent)" stroke-width="4" stroke-linecap="round">
    <line x1="0" y1="50" x2="0" y2="80"/>
    <line x1="15" y1="30" x2="15" y2="100"/>
    <line x1="30" y1="55" x2="30" y2="75"/>
    <line x1="45" y1="10" x2="45" y2="120"/>
    <line x1="60" y1="35" x2="60" y2="95"/>
    <line x1="75" y1="45" x2="75" y2="85"/>
    <line x1="90" y1="20" x2="90" y2="110"/>
    <line x1="105" y1="50" x2="105" y2="80"/>
    <line x1="120" y1="25" x2="120" y2="105"/>
    <line x1="135" y1="40" x2="135" y2="90"/>
    <line x1="150" y1="15" x2="150" y2="115"/>
    <line x1="165" y1="55" x2="165" y2="75"/>
    <line x1="180" y1="30" x2="180" y2="100"/>
    <line x1="195" y1="45" x2="195" y2="85"/>
    <line x1="210" y1="20" x2="210" y2="110"/>
    <line x1="225" y1="50" x2="225" y2="80"/>
  </g>

  <!-- Domain -->
  <text x="1120" y="590" text-anchor="end" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#64748B">
    meetflow-ai.github.io
  </text>
</svg>
